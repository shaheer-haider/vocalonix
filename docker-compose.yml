services:
  postgres:
    extends:
      file: ./dograh/docker-compose.yaml
      service: postgres

  vocalonix-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${VOCALONIX_POSTGRES_USER:-vocalonix}"
      POSTGRES_PASSWORD: "${VOCALONIX_POSTGRES_PASSWORD:-vocalonix}"
      POSTGRES_DB: "${VOCALONIX_POSTGRES_DB:-vocalonix}"
    ports:
      - "${VOCALONIX_POSTGRES_PORT:-5433}:5432"
    volumes:
      - vocalonix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${VOCALONIX_POSTGRES_USER:-vocalonix} -d ${VOCALONIX_POSTGRES_DB:-vocalonix}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  redis:
    extends:
      file: ./dograh/docker-compose.yaml
      service: redis

  minio:
    extends:
      file: ./dograh/docker-compose.yaml
      service: minio

  api:
    extends:
      file: ./dograh/docker-compose.yaml
      service: api
    image: dograhai/dograh-api:${DOGRAH_VERSION:-1.41.0}
    environment:
      UI_APP_URL: "${DOGRAH_WIDGET_URL:-http://localhost:3000}"
      CORS_ALLOWED_ORIGINS: "${APP_ORIGIN:-http://localhost:3000}"

  ui:
    extends:
      file: ./dograh/docker-compose.yaml
      service: ui
    image: dograhai/dograh-ui:${DOGRAH_VERSION:-1.41.0}

  vocalonix-api:
    build:
      context: .
      dockerfile: app/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      APP_ORIGIN: "${APP_ORIGIN:-http://localhost:3000}"
      API_PUBLIC_URL: "${VOCALONIX_API_PUBLIC_URL:-http://localhost:3001}"
      NODE_ENV: "${NODE_ENV:-development}"
      DATABASE_URL: "postgres://${VOCALONIX_POSTGRES_USER:-vocalonix}:${VOCALONIX_POSTGRES_PASSWORD:-vocalonix}@vocalonix-db:5432/${VOCALONIX_POSTGRES_DB:-vocalonix}"
      AUTH_SECRET: "${AUTH_SECRET:-dev-only-vocalonix-auth-secret-change-before-production}"
      REQUIRE_EMAIL_VERIFICATION: "${REQUIRE_EMAIL_VERIFICATION:-false}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-Vocalonix <hello@vocalonix.ai>}"
      DOGRAH_INTERNAL_URL: "http://api:8000"
      DOGRAH_PUBLIC_API_URL: "${DOGRAH_PUBLIC_API_URL:-http://localhost:8000}"
      DOGRAH_WIDGET_URL: "${DOGRAH_WIDGET_URL:-http://localhost:3000}"
      DOGRAH_STORAGE_INTERNAL_URL: "http://minio:9000"
      DOGRAH_API_KEY: "${DOGRAH_API_KEY:-}"
      DOGRAH_SERVICE_EMAIL: "${DOGRAH_SERVICE_EMAIL:-vocalonix@vocalonix.ai}"
      DOGRAH_SERVICE_PASSWORD: "${DOGRAH_SERVICE_PASSWORD:-change-me-vocalonix}"
      DOGRAH_SERVICE_NAME: "${DOGRAH_SERVICE_NAME:-Vocalonix}"
      DOGRAH_WORKFLOW_NAME: "${DOGRAH_WORKFLOW_NAME:-Vocalonix Agent}"
      DOGRAH_WIDGET_ALLOWED_DOMAINS: "${DOGRAH_WIDGET_ALLOWED_DOMAINS:-localhost,127.0.0.1}"
    ports:
      - "3001:3001"
    depends_on:
      vocalonix-db:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3001/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  vocalonix-worker:
    build:
      context: .
      dockerfile: app/api/Dockerfile
    restart: unless-stopped
    command: ["bun", "src/worker.ts"]
    environment:
      PORT: "3001"
      APP_ORIGIN: "${APP_ORIGIN:-http://localhost:3000}"
      API_PUBLIC_URL: "${VOCALONIX_API_PUBLIC_URL:-http://localhost:3001}"
      NODE_ENV: "${NODE_ENV:-development}"
      DATABASE_URL: "postgres://${VOCALONIX_POSTGRES_USER:-vocalonix}:${VOCALONIX_POSTGRES_PASSWORD:-vocalonix}@vocalonix-db:5432/${VOCALONIX_POSTGRES_DB:-vocalonix}"
      AUTH_SECRET: "${AUTH_SECRET:-dev-only-vocalonix-auth-secret-change-before-production}"
      REQUIRE_EMAIL_VERIFICATION: "${REQUIRE_EMAIL_VERIFICATION:-false}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-Vocalonix <hello@vocalonix.ai>}"
      DOGRAH_INTERNAL_URL: "http://api:8000"
      DOGRAH_PUBLIC_API_URL: "${DOGRAH_PUBLIC_API_URL:-http://localhost:8000}"
      DOGRAH_WIDGET_URL: "${DOGRAH_WIDGET_URL:-http://localhost:3000}"
      DOGRAH_STORAGE_INTERNAL_URL: "http://minio:9000"
      DOGRAH_API_KEY: "${DOGRAH_API_KEY:-}"
      DOGRAH_SERVICE_EMAIL: "${DOGRAH_SERVICE_EMAIL:-vocalonix@vocalonix.ai}"
      DOGRAH_SERVICE_PASSWORD: "${DOGRAH_SERVICE_PASSWORD:-change-me-vocalonix}"
      DOGRAH_SERVICE_NAME: "${DOGRAH_SERVICE_NAME:-Vocalonix}"
      DOGRAH_WORKFLOW_NAME: "${DOGRAH_WORKFLOW_NAME:-Vocalonix Agent}"
      DOGRAH_WIDGET_ALLOWED_DOMAINS: "${DOGRAH_WIDGET_ALLOWED_DOMAINS:-localhost,127.0.0.1}"
    depends_on:
      vocalonix-api:
        condition: service_healthy
    networks:
      - app-network

  vocalonix-web:
    build:
      context: .
      dockerfile: app/web/Dockerfile
      args:
        VITE_API_BASE_URL: "${VOCALONIX_API_PUBLIC_URL:-http://localhost:3001}"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      vocalonix-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

volumes:
  postgres_data:
  vocalonix_postgres_data:
  redis_data:
  minio-data:

networks:
  app-network:
    driver: bridge
