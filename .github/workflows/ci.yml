name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.45
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - run: ./scripts/setup.sh
